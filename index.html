<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Anita's Bakers – Premium Pure-Vegetarian Bakery in Narsingpur. Fresh breads, eggless cakes & pastries.">
  
  <!-- Open Graph / SEO / WhatsApp Tags -->
  <meta property="og:title" content="Anita's Bakers • Pure Vegetarian Bakery">
  <meta property="og:description" content="Explore our exquisite eggless confections and artisanal breads, crafted daily with love in Narsingpur!">
  <meta property="og:image" content="https://anitasbakers.netlify.app/logo/Anita's%20Bakers.png">
  <meta property="og:url" content="https://anitasbakers.netlify.app/">
  <meta property="og:type" content="website">

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#d4af37">

  <title>Anita's Bakers • Pure Vegetarian Bakery</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='0.9em' font-size='90'%3E%F0%9F%A5%90%3C/text%3E%3C/svg%3E">
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Rubik:wght@400;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1B5E20 0%, #2E7D32 30%, #4CAF50 60%, #8B4513 100%);
      overflow: hidden;
      font-family: 'Rubik', sans-serif;
    }

    .splash {
      text-align: center;
      color: #fff;
      animation: fadeIn 1s ease;
    }

    .splash-logo {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid rgba(255,255,255,0.3);
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      animation: logoPulse 2s ease-in-out infinite, logoEntry 1s ease;
      margin-bottom: 30px;
    }

    .splash-title {
      font-family: 'Great Vibes', cursive;
      font-size: 4rem;
      font-weight: 400;
      text-shadow: 0 4px 20px rgba(0,0,0,0.3);
      margin-bottom: 10px;
      animation: slideUp 0.8s ease 0.3s both;
    }

    .splash-tagline {
      font-size: 1.1rem;
      font-weight: 500;
      opacity: 0.9;
      letter-spacing: 2px;
      text-transform: uppercase;
      animation: slideUp 0.8s ease 0.5s both;
      margin-bottom: 15px;
    }

    .splash-sub {
      font-size: 0.9rem;
      opacity: 0.75;
      animation: slideUp 0.8s ease 0.7s both;
      margin-bottom: 50px;
    }

    .splash-loader {
      width: 50px;
      height: 50px;
      margin: 0 auto;
      border: 3px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite, slideUp 0.8s ease 0.9s both;
    }

    /* Floating bakery items */
    .float-item {
      position: fixed;
      font-size: 2.5rem;
      opacity: 0.15;
      animation: floatAround 8s ease-in-out infinite;
      pointer-events: none;
    }
    .float-item:nth-child(1) { top: 10%; left: 8%; animation-delay: 0s; }
    .float-item:nth-child(2) { top: 20%; right: 10%; animation-delay: 1.5s; font-size: 3rem; }
    .float-item:nth-child(3) { bottom: 15%; left: 12%; animation-delay: 3s; }
    .float-item:nth-child(4) { bottom: 25%; right: 8%; animation-delay: 0.8s; font-size: 2rem; }
    .float-item:nth-child(5) { top: 50%; left: 5%; animation-delay: 2s; }
    .float-item:nth-child(6) { top: 40%; right: 5%; animation-delay: 4s; font-size: 3rem; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes logoEntry { from { transform: scale(0.5) rotate(-10deg); opacity: 0; } to { transform: scale(1) rotate(0); opacity: 1; } }
    @keyframes logoPulse { 0%,100% { transform: scale(1); box-shadow: 0 20px 60px rgba(0,0,0,0.3); } 50% { transform: scale(1.05); box-shadow: 0 25px 70px rgba(0,0,0,0.4); } }
    @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes floatAround { 0%,100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-20px) rotate(10deg); } }

    @media (max-width: 480px) {
      .splash-title { font-size: 2.8rem; }
      .splash-logo { width: 110px; height: 110px; }
    }
  </style>
</head>
<body>
  <!-- Floating bakery emojis -->
  <div class="float-item">🍞</div>
  <div class="float-item">🎂</div>
  <div class="float-item">🧁</div>
  <div class="float-item">🥐</div>
  <div class="float-item">🍰</div>
  <div class="float-item">🌿</div>

  <div class="splash">
    <img src="logo/Anita's Bakers.png" alt="Anita's Bakers" class="splash-logo">
    <h1 class="splash-title">Anita's Bakers</h1>
    <p class="splash-tagline">🌿 100% Pure Vegetarian</p>
    <p class="splash-sub">Fresh • Egg-Free • Made with Love</p>
    <div class="splash-loader"></div>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('service-worker.js').catch(e => console.log(e));
      });
    }

    // Redirect to home after 3.5 seconds
    setTimeout(() => {
      window.location.href = 'pages/home.html';
    }, 3500);
  </script>
</body>
</html>
