<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Anita's Bakers – Premium Pure-Vegetarian Bakery in Narsingpur. Fresh breads, eggless cakes & pastries.">
  
  <!-- Open Graph / SEO / WhatsApp Tags -->
  <meta property="og:title" content="Anita's Bakers • Pure Vegetarian Bakery">
  <meta property="og:description" content="Explore our exquisite eggless confections and artisanal breads, crafted daily with love in Narsingpur!">
  <meta property="og:image" content="https://anitas-bakers.vercel.app/logo/Anita's%20Bakers.png">
  <meta property="og:url" content="https://anitas-bakers.vercel.app/">
  <meta property="og:type" content="website">

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#d4af37">

  <title>Anita's Bakers • Pure Vegetarian Bakery</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='0.9em' font-size='90'%3E%F0%9F%A5%90%3C/text%3E%3C/svg%3E">
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Rubik:wght@400;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --gold-main: #D4AF37;
      --gold-gradient: linear-gradient(135deg, #FBE7A1 0%, #D4AF37 50%, #996515 100%);
      --bg-deep: #0B0908;
      --text-primary: #FEF7EE;
      --font-display: 'Playfair Display', serif;
      --font-body: 'Rubik', sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-deep);
      overflow: hidden;
      font-family: var(--font-body);
    }

    /* Subtle glow background */
    body::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(circle at center, rgba(212, 175, 55, 0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .splash {
      text-align: center;
      color: var(--text-primary);
      animation: fadeIn 1s ease;
      z-index: 10;
    }

    .splash-logo {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid var(--gold-main);
      box-shadow: 0 0 40px rgba(212, 175, 55, 0.4);
      animation: logoPulse 2s ease-in-out infinite, logoEntry 1s ease;
      margin-bottom: 25px;
      background: #14100E;
    }

    .splash-title {
      font-family: var(--font-display);
      font-size: 3.5rem;
      font-weight: 700;
      background: var(--gold-gradient);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
      animation: slideUp 0.8s ease 0.3s both;
      letter-spacing: 2px;
    }

    .splash-tagline {
      font-size: 1rem;
      font-weight: 600;
      color: var(--gold-main);
      letter-spacing: 4px;
      text-transform: uppercase;
      animation: slideUp 0.8s ease 0.5s both;
      margin-bottom: 12px;
    }

    .splash-sub {
      font-size: 0.85rem;
      color: rgba(254, 247, 238, 0.6);
      animation: slideUp 0.8s ease 0.7s both;
      margin-bottom: 45px;
      font-family: var(--font-display);
      font-style: italic;
    }

    .splash-loader {
      width: 45px;
      height: 45px;
      margin: 0 auto;
      border: 2px solid rgba(212, 175, 55, 0.1);
      border-top: 2px solid var(--gold-main);
      border-radius: 50%;
      animation: spin 0.8s linear infinite, slideUp 0.8s ease 0.9s both;
    }

    /* Floating bakery items */
    .float-item {
      position: fixed;
      font-size: 2.2rem;
      opacity: 0.08;
      filter: sepia(1) saturate(5) hue-rotate(5deg);
      animation: floatAround 10s ease-in-out infinite;
      pointer-events: none;
    }
    .float-item:nth-child(1) { top: 12%; left: 10%; animation-delay: 0s; }
    .float-item:nth-child(2) { top: 18%; right: 12%; animation-delay: 2s; }
    .float-item:nth-child(3) { bottom: 15%; left: 15%; animation-delay: 4s; }
    .float-item:nth-child(4) { bottom: 12%; right: 10%; animation-delay: 1s; }

    @keyframes spin { 100% { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes logoEntry { 
      from { opacity: 0; transform: scale(0.7) translateY(20px); } 
      to { opacity: 1; transform: scale(1) translateY(0); } 
    }
    @keyframes logoPulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 40px rgba(212, 175, 55, 0.4); }
      50% { transform: scale(1.05); box-shadow: 0 0 60px rgba(212, 175, 55, 0.6); }
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes floatAround {
      0%, 100% { transform: translate(0,0) rotate(0deg); }
      50% { transform: translate(20px, 20px) rotate(15deg); }
    }

    @media (max-width: 480px) {
      .splash-title { font-size: 2.8rem; }
      .splash-logo { width: 120px; height: 120px; }
    }
  </style>
</head>
<body>
  <!-- Floating bakery emojis -->
  <div class="float-item">🥐</div>
  <div class="float-item">🎂</div>
  <div class="float-item">🧁</div>
  <div class="float-item">🍰</div>

  <div class="splash">
    <img src="logo/Anita's Bakers.png" alt="Anita's Bakers" class="splash-logo">
    <h1 class="splash-title">Anita's Bakers</h1>
    <p class="splash-tagline">Pure Vegetarian Excellence</p>
    <p class="splash-sub">Specializing in Freshly Baked Confections Since 2024</p>
    <div class="splash-loader"></div>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('service-worker.js').catch(e => console.log(e));
      });
    }

    // Smooth transition to home or PWA
    setTimeout(() => {
      document.body.style.opacity = '0';
      document.body.style.transition = 'opacity 0.8s ease';
      setTimeout(() => {
        window.location.href = 'pages/home.html';
      }, 700);
    }, 3000);
  </script>
</body>
</html>
