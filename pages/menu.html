<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Explore the full menu at Anita's Bakers – Pure vegetarian breads, cakes & pastries.">
  <title>Menu • Anita's Bakers</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='0.9em' font-size='90'%3E%F0%9F%A5%90%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="../style.css"/>
  <style>
    /* Hero banner */
    .menu-hero {
      height: 45vh;
      min-height: 380px;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        linear-gradient(135deg, rgba(11,9,8,0.8), rgba(11,9,8,0.5)),
        url('https://images.unsplash.com/photo-1558961363-fa8fdf82db35?q=80&w=1500&auto=format&fit=crop') center/cover;
      text-align: center;
      color: var(--text-primary);
      padding: 0 20px;
      border-bottom: 1px solid rgba(212,175,55,0.1);
    }

    .menu-hero-content {
      max-width: 800px;
      animation: fadeInUp 0.8s ease;
    }

    .menu-hero-pre {
      font-size: 1rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--gold-main);
      margin-bottom: 15px;
      display: block;
    }

    .menu-hero h1 {
      font-family: var(--font-display);
      font-size: var(--font-hero);
      font-weight: 400;
      margin-bottom: 20px;
      color: var(--text-primary);
      text-shadow: 0 4px 20px rgba(0,0,0,0.8);
      line-height: 1.1;
    }

    /* Filters */
    .filter-bar {
      background: var(--bg-surface);
      backdrop-filter: blur(15px);
      padding: var(--space-md) var(--space-lg);
      border-bottom: 1px solid rgba(212,175,55,0.1);
      position: sticky;
      top: 0;
      z-index: 40;
      display: flex;
      align-items: center;
      gap: var(--space-md);
      overflow-x: auto;
      scrollbar-width: none; /* Hide scrollbar for Firefox */
      justify-content: flex-start;
      -ms-overflow-style: none;  /* Hide scrollbar for IE/Edge */
    }
    
    .filter-bar::-webkit-scrollbar {
      display: none; /* Hide scrollbar for Chrome/Safari */
    }

    .filter-btn {
      padding: 10px 24px;
      border-radius: var(--radius-full);
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-secondary);
      background: transparent;
      border: 1px solid rgba(255,255,255,0.1);
      cursor: pointer;
      transition: all 0.3s;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .filter-btn.active {
      background: var(--gold-gradient);
      color: var(--bg-deep);
      border-color: transparent;
      box-shadow: var(--gold-glow);
    }

    .filter-btn:hover:not(.active) {
      background: rgba(212,175,55,0.1);
      color: var(--gold-light);
      border-color: rgba(212,175,55,0.3);
    }

    .search-box {
      padding: 12px 24px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(0,0,0,0.4);
      border-radius: var(--radius-full);
      font-size: 0.9rem;
      color: var(--text-primary);
      min-width: 280px;
      outline: none;
      transition: all 0.3s;
      flex-shrink: 0;
    }

    .search-box:focus {
      border-color: var(--gold-main);
      box-shadow: 0 0 15px rgba(212,175,55,0.15);
      background: rgba(212,175,55,0.02);
    }

    /* Menu Grid */
    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(clamp(280px, 30vw, 400px), 1fr));
      gap: var(--space-xl);
      padding: var(--space-3xl) var(--space-lg);
      max-width: 1400px;
      margin: 0 auto;
    }

    .menu-item {
      background: var(--bg-surface);
      border: 1px solid rgba(255,255,255,0.03);
      border-radius: var(--radius-xl);
      overflow: hidden;
      transition: all 0.4s var(--ease-super-smooth);
      position: relative;
    }

    .menu-item:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.6);
      border-color: rgba(212,175,55,0.2);
    }

    .mi-img-wrap {
      height: 250px;
      overflow: hidden;
      background: #080605;
      position: relative;
    }

    .mi-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.6s ease;
      filter: brightness(0.9);
    }

    .menu-item:hover .mi-img-wrap img {
      transform: scale(1.08);
      filter: brightness(1.1);
    }

    .mi-details {
      padding: 24px;
    }

    .mi-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .mi-title {
      font-family: var(--font-display);
      font-size: 1.5rem;
      color: var(--text-primary);
      font-weight: 600;
    }

    .mi-price {
      font-family: var(--font-display);
      color: var(--gold-main);
      font-size: 1.4rem;
      font-weight: 700;
    }

    .mi-desc {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .mi-order-btn {
      width: 100%;
      background: rgba(212,175,55,0.05);
      border: 1px solid rgba(212,175,55,0.2);
      color: var(--gold-main);
      padding: 12px;
      border-radius: var(--radius-full);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.3s;
    }

    .menu-item:hover .mi-order-btn {
      background: var(--gold-gradient);
      color: var(--bg-deep);
      border-color: transparent;
      box-shadow: 0 4px 15px rgba(212,175,55,0.2);
    }

    .no-results {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 20px;
      color: var(--text-muted);
      font-size: 1.2rem;
    }

    @media (max-width: 600px) {
      .menu-hero { min-height: 300px; padding: 120px var(--space-lg) 60px; }
      .filter-bar { padding: var(--space-sm) var(--space-md); }
      .filter-btn { padding: 8px 16px; font-size: 0.8rem; flex-shrink: 0; }
      .search-box { min-width: 200px; }
    }
  </style>
</head>
<body>
  <div id="header-slot"></div>

  <section class="menu-hero">
    <div class="menu-hero-content">
      <span class="menu-hero-pre">Our Masterpieces</span>
      <h1>The Grand Menu</h1>
      <p style="color:var(--text-secondary); font-size:1.2rem; max-width:600px; margin:0 auto;">Handcrafted pure vegetarian delights, baked fresh using the finest ingredients.</p>
    </div>
  </section>

  <div class="filter-bar" id="filters">
    <button class="filter-btn active" data-cat="all">All Collection</button>
    <button class="filter-btn" data-cat="cakes">Signature Cakes</button>
    <button class="filter-btn" data-cat="bread">Artisanal Breads</button>
    <button class="filter-btn" data-cat="snacks">Savouries & Snacks</button>
    <input type="text" class="search-box" id="search" placeholder="Search our collection...">
  </div>

  <div class="menu-grid" id="menu-grid"></div>

  <div id="footer-slot"></div>

  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>
  <script src="../app.js"></script>
  <script>
    let activeCat = 'all';
    let searchQuery = '';

    onReady(() => {
      initShared('menu');
      renderMenu();

      // Filters setup
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          e.target.classList.add('active');
          activeCat = e.target.dataset.cat;
          renderMenu();
        });
      });

      // Search setup
      const searchBox = document.getElementById('search');
      searchBox.addEventListener('input', (e) => {
        searchQuery = e.target.value.toLowerCase().trim();
        renderMenu();
      });
    });

    const descs = {
      bread: 'Organic flour, slow fermentation, cloud-soft centre.',
      khari: 'Hand-rolled, 100-layer flaky pastry.',
      mava: 'Rich, dense, infused with cardamom.',
      blackforest: 'Dark Belgian chocolate, fresh cherries.',
      redvelvet: 'Velvety crimson sponge with creamy frosting.',
      blueberry: 'Vanilla sponge bursting with blueberries.',
    };

    async function renderMenu() {
      const grid = document.getElementById('menu-grid');
      
      let filtered = await APP.getProducts();
      
      if (activeCat !== 'all') {
        filtered = filtered.filter(p => p.cat === activeCat);
      }
      
      if (searchQuery) {
        filtered = filtered.filter(p => p.name.toLowerCase().includes(searchQuery));
      }

      if (filtered.length === 0) {
        grid.innerHTML = `<div class="no-results">No delicacies found in this collection.</div>`;
        return;
      }

      grid.innerHTML = filtered.map((p, i) => `
        <article class="menu-item" style="animation: fadeInUp 0.6s ease forwards ${i * 0.05}s; opacity:0;">
          <div class="mi-img-wrap">
            <span class="veg-badge" style="position:absolute; top:15px; right:15px; z-index:5;">🌿 Veg</span>
            <img src="${p.img}" alt="${p.name}" loading="lazy">
          </div>
          <div class="mi-details">
            <div class="mi-header">
              <h3 class="mi-title">${p.name.replace(/[🍞🫓🥐🧁🍰🎂]/g, '').trim()}</h3>
              <span class="mi-price">${p.price}</span>
            </div>
            <p class="mi-desc">${descs[p.id] || 'Pure, eggless, premium confection baked to absolute perfection.'}</p>
            <button class="mi-order-btn" onclick="orderItem('${p.name.replace(/'/g, "\\'")}', '${p.price}')">Order on WhatsApp</button>
          </div>
        </article>
      `).join('');
    }

    function orderItem(name, price) {
      APP.orderViaWhatsApp(name, `Current Price: ${price}`);
    }
  </script>
</body>
</html>
